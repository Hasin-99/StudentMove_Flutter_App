name: studentmove
description: Smart Transportation for Dhaka Students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  connectivity_plus: ^6.0.5
  local_auth: ^2.3.0
  google_maps_flutter: ^2.5.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.20.2
  url_launcher: ^6.2.2
  pdf: ^3.10.7
  path_provider: ^2.1.1
  image_picker: ^1.0.5
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1
  printing: ^5.14.3
  geolocator: ^14.0.2
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_messaging: ^15.2.9
  cloud_functions: ^5.6.1
  firebase_app_check: ^0.3.2+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app image/logo.png"
  min_sdk_android: 21
